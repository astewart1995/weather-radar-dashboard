<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>TN Radar Pro (Stable)</title>

<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    background:black;
    overflow:hidden;
    font-family: Arial, sans-serif;
}

#wrap {
    position:relative;
    width:100%;
    height:100%;
}

#radar {
    width:100%;
    height:100%;
    object-fit:cover;
}

#bar {
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:42px;
    background:rgba(0,0,0,0.6);
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;
    font-size:14px;
    z-index:10;
}

#title {
    font-weight:bold;
    color:#00d4ff;
}
</style>
</head>

<body>

<div id="wrap">

    <div id="bar">
        <div id="title">TENNESSEE RADAR</div>
        <div id="time"></div>
    </div>

    <img id="radar" />

</div>

<script>

// ======================
// CLOCK
// ======================
function updateClock() {
    document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

// ======================
// REAL WORKING RADAR IMAGE (NO TILE MATH)
// ======================
//
// This uses a stable NOAA composite image endpoint.
//
// ======================
function loadRadar() {

    const ts = Date.now();

    // NOAA CONUS radar image (stable, no tile math)
    const url =
    "https://radar.weather.gov/ridge/standard/CONUS_loop.gif?ts=" + ts;

    const img = document.getElementById("radar");

    const testImg = new Image();

    testImg.onload = () => {
        img.src = testImg.src;
    };

    testImg.onerror = () => {
        console.log("Radar failed to load");
    };

    testImg.src = url;
}

// initial load
loadRadar();

// refresh every 60 seconds (DAKboard safe)
setInterval(loadRadar, 60000);

</script>

</body>
</html>
