<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Live Radar (DAKboard)</title>

<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    background:#000;
    overflow:hidden;
    font-family: Arial, sans-serif;
}

#container {
    position:relative;
    width:100%;
    height:100%;
}

#radar {
    width:100%;
    height:100%;
    object-fit:cover;
}

#bar {
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:40px;
    background:rgba(0,0,0,0.6);
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;
    font-size:14px;
}

#label {
    font-weight:bold;
}
</style>
</head>

<body>

<div id="container">

    <div id="bar">
        <div id="label">TENNESSEE RADAR</div>
        <div id="time"></div>
    </div>

    <img id="radar" src="" />

</div>

<script>

// ======================
// LOCATION (TN CENTER)
// ======================
const lat = 36.1209302;
const lon = -87.6574700;

// ======================
// CLOCK
// ======================
function updateClock() {
    document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

// ======================
// RADAR IMAGE GENERATOR
// ======================
//
// This uses RainViewer static tile rendering,
// but we convert it into a single image snapshot.
//
// ======================
function loadRadar() {

    const timestamp = Date.now();

    // Fixed zoom + center approach (static render tile)
    const z = 6;
    const x = 18;
    const y = 25;

    const url =
    `https://tilecache.rainviewer.com/v2/radar/0/256/${z}/${x}/${y}/2/1_1.png?ts=${timestamp}`;

    document.getElementById("radar").src = url;
}

// initial load
loadRadar();

// refresh every 60 seconds (DAKboard safe)
setInterval(loadRadar, 60000);

</script>

</body>
</html>
