<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tennessee Live Radar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    overflow:hidden;
    font-family: Arial, sans-serif;
}

#map {
    position:absolute;
    top:0;
    bottom:0;
    width:100%;
}

#bar {
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:45px;
    background:white;
    z-index:9999;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 12px;
    border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div id="bar">
    <div><b>Tennessee Radar</b></div>
    <div id="time"></div>
</div>

<div id="map"></div>

<script>

// ======================
// MAP (TENNESSEE FOCUS)
// ======================
const center = [36.1209302, -87.6574700];

const map = L.map('map', {
    center: center,
    zoom: 7,
    minZoom: 6,
    maxZoom: 10
});

// Base map
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// Clock
setInterval(() => {
    document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
}, 1000);

// Marker
L.marker(center).addTo(map);

// ======================
// SMOOTH RADAR (NO BLINK FIX)
// ======================
let frames = [];
let layers = [];
let index = 0;

async function loadRadar() {

    const res = await fetch("https://api.rainviewer.com/public/weather-maps.json");
    const data = await res.json();

    frames = data.radar.past.slice(-10);

    buildLayers();
    startAnimation();
}

// Build all radar layers ONCE
function buildLayers() {

    frames.forEach(frame => {

        const url =
        `https://tilecache.rainviewer.com${frame.path}/256/{z}/{x}/{y}/2/1_1.png`;

        const layer = L.tileLayer(url, {
            opacity: 0,
            zIndex: 500
        }).addTo(map);

        layers.push(layer);
    });
}

// Smooth fade animation (NO layer removal)
function startAnimation() {

    layers[0].setOpacity(0.6);

    setInterval(() => {

        layers[index].setOpacity(0);

        index++;

        if (index >= layers.length) index = 0;

        layers[index].setOpacity(0.6);

    }, 450);
}

loadRadar();

</script>

</body>
</html>
