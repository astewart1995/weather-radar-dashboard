<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>RadarScope Style Weather Radar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    overflow:hidden;
    background:#ffffff;
    font-family: Arial, sans-serif;
}

#map {
    position:absolute;
    top:0;
    bottom:0;
    width:100%;
}

/* TOP BAR */
#topBar {
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:50px;
    background:rgba(255,255,255,0.9);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 15px;
    z-index:1000;
    border-bottom:1px solid #ddd;
}

#title {
    color:#0077ff;
    font-weight:bold;
    letter-spacing:1px;
}

#clock {
    color:#333;
}

/* radar fade effect */
.leaflet-image-layer {
    transition: opacity 0.3s linear;
}
</style>
</head>

<body>

<div id="topBar">
    <div id="title">LIVE RADAR</div>
    <div id="clock">--:--</div>
</div>

<div id="map"></div>

<script>

// ======================
// LOCATION
// ======================
const station = [36.1209302, -87.6574700];

// ======================
// MAP (LIGHT STYLE)
// ======================
const map = L.map('map', {
    center: station,
    zoom: 6
});

// Clean basemap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// ======================
// CLOCK
// ======================
function updateClock() {
    const el = document.getElementById("clock");
    const now = new Date();
    el.innerText = now.toLocaleTimeString([], {
        hour:'2-digit',
        minute:'2-digit'
    });
}
setInterval(updateClock,1000);
updateClock();

// ======================
// STATION MARKER
// ======================
L.marker(station).addTo(map);

// ======================
// TENNESSEE BORDER
// ======================
fetch("https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json")
.then(r => r.json())
.then(data => {

    L.geoJSON(data, {
        style: f => ({
            color: f.properties.name === "Tennessee" ? "#00aaff" : "#999",
            weight: f.properties.name === "Tennessee" ? 3 : 1,
            fillOpacity: 0
        })
    }).addTo(map);

});

// ======================
// RADAR SCOPE STYLE ANIMATION
// ======================
let frames = [];
let index = 0;
let layer = null;

async function loadRadar() {

    const res = await fetch("https://api.rainviewer.com/public/weather-maps.json");
    const data = await res.json();

    frames = data.radar.past;

    playRadar();
}

function showFrame(i) {

    const path = frames[i].path;

    const url =
    `https://tilecache.rainviewer.com${path}/256/6/20/15/2/1_1.png`;

    if (layer) {
        map.removeLayer(layer);
    }

    layer = L.imageOverlay(url, map.getBounds(), {
        opacity: 0.6
    });

    layer.addTo(map);
}

function playRadar() {

    index = 0;
    showFrame(index);

    setInterval(() => {

        index++;

        if (index >= frames.length) index = 0;

        showFrame(index);

    }, 500);

}

// ======================
// FIX: start safely after load
// ======================
setTimeout(loadRadar, 1500);

</script>

</body>
</html>
