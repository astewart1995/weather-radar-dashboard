<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>TN Radar Pro (Stable)</title>

<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    background:black;
    overflow:hidden;
    font-family: Arial, sans-serif;
}

#wrap {
    position:relative;
    width:100%;
    height:100%;
}

/* Radar styling tuned for “local focus” feel */
#radar {
    width:110%;
    height:110%;
    object-fit:cover;

    /* slight crop shift toward TN region feel */
    transform: translate(-5%, -3%);

    filter: contrast(1.05) saturate(1.05) brightness(0.98);
}

/* Top bar */
#bar {
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:42px;
    background:rgba(0,0,0,0.55);
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;
    font-size:14px;
    z-index:10;
    backdrop-filter: blur(6px);
}

#title {
    font-weight:bold;
    color:#4fc3ff;
    letter-spacing:0.5px;
}
</style>
</head>

<body>

<div id="wrap">

    <div id="bar">
        <div id="title">TENNESSEE RADAR</div>
        <div id="time"></div>
    </div>

    <img id="radar" />

</div>

<script>

// ======================
// CLOCK
// ======================
function updateClock() {
    document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

// ======================
// STABLE RADAR LOADER
// ======================
function loadRadar() {

    const img = document.getElementById("radar");

    // NOAA loop (stable + widely supported)
    const url =
    "https://radar.weather.gov/ridge/standard/CONUS_loop.gif?t=" + Date.now();

    const temp = new Image();

    temp.onload = () => {
        img.src = temp.src;
    };

    temp.onerror = () => {
        console.log("Radar failed to load");
    };

    temp.src = url;
}

// initial load
loadRadar();

// refresh every 60 seconds (DAKboard safe)
setInterval(loadRadar, 60000);

</script>

</body>
</html>
