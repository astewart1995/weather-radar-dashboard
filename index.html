<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    overflow:hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background:#0b0f14;
}

/* radar container */
#wrap {
    position:relative;
    width:100%;
    height:100%;
}

/* radar image (soft, realistic look) */
#radar {
    width:100%;
    height:100%;
    object-fit:cover;

    /* REMOVE “cartoon” look */
    filter: contrast(1.02) saturate(1.05) brightness(0.98);
}

/* top bar (professional UI style) */
#bar {
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:38px;

    background:rgba(15, 18, 22, 0.75);
    backdrop-filter: blur(8px);

    color:#cfd6dd;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 12px;

    font-size:12.5px;
    letter-spacing:0.4px;

    border-bottom:1px solid rgba(255,255,255,0.06);
}

/* title styling (subtle, not neon) */
#title {
    font-weight:500;
    color:#e6edf3;
}

/* status text muted */
#time {
    opacity:0.75;
}
</style>
