<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Live Weather Radar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    overflow:hidden;
    background:#ffffff;
    font-family: Arial, sans-serif;
}

#map {
    position:absolute;
    top:0;
    bottom:0;
    width:100%;
}

/* TOP BAR */
#topBar {
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:50px;
    background:rgba(255,255,255,0.95);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 15px;
    z-index:1000;
    border-bottom:1px solid #ddd;
}

#title {
    color:#0077ff;
    font-weight:bold;
    letter-spacing:1px;
}

#clock {
    color:#333;
    font-size:14px;
}

/* pulsing marker */
.pulse {
    width:14px;
    height:14px;
    border-radius:50%;
    background:#00aaff;
    border:2px solid white;
    box-shadow:0 0 10px #00aaff;
    animation:pulse 1.4s infinite;
}

@keyframes pulse {
    0% {transform:scale(1); opacity:1;}
    70% {transform:scale(2); opacity:0.2;}
    100% {transform:scale(1); opacity:1;}
}
</style>
</head>

<body>

<div id="topBar">
    <div id="title">LIVE WEATHER RADAR</div>
    <div id="clock">--:--</div>
</div>

<div id="map"></div>

<script>

// ======================
// LOCATION
// ======================
const station = [36.1209302, -87.6574700];

// ======================
// MAP (FIXED ZOOM + STABILITY)
// ======================
const map = L.map('map', {
    center: station,
    zoom: 5
});

// Light basemap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// ======================
// CLOCK
// ======================
function updateClock() {
    const el = document.getElementById("clock");
    const now = new Date();
    el.innerText = now.toLocaleTimeString([], {
        hour:'2-digit',
        minute:'2-digit'
    });
}
setInterval(updateClock, 1000);
updateClock();

// ======================
// STATION MARKER
// ======================
const icon = L.divIcon({
    className: "",
    html: '<div class="pulse"></div>',
    iconSize: [14,14],
    iconAnchor: [7,7]
});

L.marker(station, { icon }).addTo(map);

// ======================
// TENNESSEE BORDER
// ======================
fetch("https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json")
.then(r => r.json())
.then(data => {

    L.geoJSON(data, {
        style: f => ({
            color: f.properties.name === "Tennessee" ? "#00aaff" : "#999",
            weight: f.properties.name === "Tennessee" ? 3 : 1,
            fillOpacity: 0
        })
    }).addTo(map);

});

// ======================
// FIXED RADAR LAYER (REAL WORKING NOAA WMS)
// ======================
const radar = L.tileLayer.wms(
"https://opengeo.ncep.noaa.gov/geoserver/conus/conus_bref_qcd/ows",
{
    layers: "conus_bref_qcd",
    format: "image/png",
    transparent: true,
    opacity: 0.55,
    attribution: "NOAA Radar"
}
).addTo(map);

</script>

</body>
</html>
