<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Live Weather Radar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    overflow:hidden;
    font-family: Arial;
}

#map {
    position:absolute;
    top:0;
    bottom:0;
    width:100%;
}

#bar {
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:45px;
    background:white;
    z-index:9999;
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div id="bar">
    <div>LIVE RADAR</div>
    <div id="time"></div>
</div>

<div id="map"></div>

<script>

// ======================
// LOCATION
// ======================
const center = [36.1209302, -87.6574700];

// ======================
// MAP (IMPORTANT FIX HERE)
// ======================
const map = L.map('map', {
    center: center,
    zoom: 5,
    minZoom: 4,
    maxZoom: 6   // 🔥 THIS FIXES "zoom level not supported"
});

// BASE MAP
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// CLOCK
setInterval(() => {
    document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
}, 1000);

// MARKER
L.marker(center).addTo(map);

// ======================
// STABLE RADAR LAYER (NO ZOOM ERRORS)
// ======================
const radar = L.tileLayer(
"https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/ridge::radar/{z}/{x}/{y}.png",
{
    opacity: 0.55,
    maxZoom: 6,
    minZoom: 4
}
).addTo(map);

</script>

</body>
</html>
