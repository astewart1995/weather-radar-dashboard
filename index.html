<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Pro Tennessee Radar</title>

<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    background:#000;
    overflow:hidden;
    font-family: Arial, sans-serif;
}

#wrap {
    position:relative;
    width:100%;
    height:100%;
}

/* radar image */
#radar {
    width:100%;
    height:100%;
    object-fit:cover;
    filter: contrast(1.05) saturate(1.2);
}

/* top bar */
#bar {
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:42px;
    background:rgba(0,0,0,0.65);
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 12px;
    font-size:14px;
    z-index:10;
}

#title {
    font-weight:bold;
    letter-spacing:1px;
    color:#00c3ff;
}

/* loading pulse */
#status {
    font-size:12px;
    opacity:0.8;
}
</style>
</head>

<body>

<div id="wrap">

    <div id="bar">
        <div id="title">TENNESSEE RADAR</div>
        <div id="status">LIVE • UPDATING</div>
        <div id="time"></div>
    </div>

    <img id="radar" src="" />

</div>

<script>

// ======================
// CLOCK
// ======================
function updateClock() {
    document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

// ======================
// RADAR CENTER (TENNESSEE)
// ======================
const lat = 36.1209302;
const lon = -87.6574700;

// ======================
// PRO RADAR IMAGE BUILDER
// ======================
//
// We use RainViewer but avoid animation.
// Instead we generate a consistent radar snapshot.
//
// ======================
function loadRadar() {

    const ts = Date.now();

    // "Zoomed region feel" (fixed tile window)
    const z = 6;

    // These coordinates are tuned for Tennessee region framing
    const x = 18;
    const y = 25;

    const url =
    `https://tilecache.rainviewer.com/v2/radar/0/256/${z}/${x}/${y}/2/1_1.png?ts=${ts}`;

    const img = document.getElementById("radar");

    // prevent flicker
    const newImg = new Image();

    newImg.onload = () => {
        img.src = newImg.src;
    };

    newImg.src = url;
}

// initial load
loadRadar();

// refresh every 60 seconds (DAKboard safe)
setInterval(loadRadar, 60000);

</script>

</body>
</html>
