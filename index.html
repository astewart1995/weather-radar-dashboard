<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Live Radar Loop</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    overflow:hidden;
    background:#ffffff;
    font-family: Arial, sans-serif;
}

#map {
    position:absolute;
    top:0;
    bottom:0;
    width:100%;
}

/* TOP BAR */
#topBar {
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:50px;
    background:rgba(255,255,255,0.95);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 15px;
    z-index:1000;
    border-bottom:1px solid #ddd;
}

#title {
    color:#0077ff;
    font-weight:bold;
}

#clock {
    color:#333;
}

/* marker */
.pulse {
    width:14px;
    height:14px;
    border-radius:50%;
    background:#00aaff;
    border:2px solid white;
    box-shadow:0 0 10px #00aaff;
    animation:pulse 1.4s infinite;
}

@keyframes pulse {
    0% {transform:scale(1); opacity:1;}
    70% {transform:scale(2); opacity:0.2;}
    100% {transform:scale(1); opacity:1;}
}
</style>
</head>

<body>

<div id="topBar">
    <div id="title">LIVE RADAR LOOP</div>
    <div id="clock">--:--</div>
</div>

<div id="map"></div>

<script>

// ======================
// LOCATION
// ======================
const station = [36.1209302, -87.6574700];

// ======================
// MAP
// ======================
const map = L.map('map', {
    center: station,
    zoom: 5
});

// light base
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// ======================
// CLOCK
// ======================
function updateClock() {
    const el = document.getElementById("clock");
    const now = new Date();
    el.innerText = now.toLocaleTimeString([], {
        hour:'2-digit',
        minute:'2-digit'
    });
}
setInterval(updateClock, 1000);
updateClock();

// ======================
// STATION MARKER
// ======================
const icon = L.divIcon({
    className: "",
    html: '<div class="pulse"></div>',
    iconSize: [14,14],
    iconAnchor: [7,7]
});

L.marker(station, { icon }).addTo(map);

// ======================
// TENNESSEE BORDER
// ======================
fetch("https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json")
.then(r => r.json())
.then(data => {

    L.geoJSON(data, {
        style: f => ({
            color: f.properties.name === "Tennessee" ? "#00aaff" : "#999",
            weight: f.properties.name === "Tennessee" ? 3 : 1,
            fillOpacity: 0
        })
    }).addTo(map);

});

// ======================
// RADAR ANIMATION (REAL WORKING LOOP)
// ======================
let frames = [];
let frameIndex = 0;
let radarLayer = null;

// get radar frames
async function loadRadar() {

    const res = await fetch("https://api.rainviewer.com/public/weather-maps.json");
    const data = await res.json();

    frames = data.radar.past.slice(-12); // last 12 frames

    playRadar();
}

// show frame
function showFrame(i) {

    const path = frames[i].path;

    const url =
    `https://tilecache.rainviewer.com${path}/256/6/20/15/2/1_1.png`;

    if (radarLayer) {
        map.removeLayer(radarLayer);
    }

    radarLayer = L.imageOverlay(url, map.getBounds(), {
        opacity: 0.6
    }).addTo(map);
}

// animation loop
function playRadar() {

    frameIndex = 0;
    showFrame(frameIndex);

    setInterval(() => {

        frameIndex++;

        if (frameIndex >= frames.length) {
            frameIndex = 0;
        }

        showFrame(frameIndex);

    }, 600);

}

// start after load
setTimeout(loadRadar, 1200);

</script>

</body>
</html>
