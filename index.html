<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tennessee Radar Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    overflow:hidden;
    font-family: Arial, sans-serif;
}

#map {
    position:absolute;
    top:0;
    bottom:0;
    width:100%;
}

#bar {
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:45px;
    background:white;
    z-index:9999;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 12px;
    border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div id="bar">
    <div><b>Tennessee Live Radar</b></div>
    <div id="time"></div>
</div>

<div id="map"></div>

<script>

// ======================
// TENNESSEE MAP LOCK (IMPORTANT FIX)
// ======================
const tennesseeBounds = [
    [34.99, -90.31],
    [36.68, -81.65]
];

const map = L.map('map', {
    center: [36.1209302, -87.6574700],
    zoom: 7,
    minZoom: 6,
    maxZoom: 9,
    maxBounds: tennesseeBounds,
    maxBoundsViscosity: 1.0
});

// Lock view properly into Tennessee
map.fitBounds(tennesseeBounds);

// Base map
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// Clock
setInterval(() => {
    document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
}, 1000);

// Marker
L.marker([36.1209302, -87.6574700]).addTo(map);

// ======================
// STABLE RADAR LAYER (NO TMS ERRORS)
// ======================
const radar = L.tileLayer.wms(
"https://opengeo.ncep.noaa.gov/geoserver/conus/conus_bref_qcd/ows",
{
    layers: "conus_bref_qcd",
    format: "image/png",
    transparent: true,
    opacity: 0.55,
    version: "1.3.0",
    tiled: true
}
).addTo(map);

</script>

</body>
</html>
